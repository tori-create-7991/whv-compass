name: Bug report
description: Something isn't working as expected.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - apps/web (UI / graph)
        - services/api (agents / RAG / ingestion)
        - infra / deploy
        - docs
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "node 20.x, pnpm 9.x, browser/OS"
