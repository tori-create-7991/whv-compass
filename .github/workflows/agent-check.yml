name: agent-check
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to check (the agent's PR branch)
        required: true
        type: string
      task_id:
        description: Notion AgentTasks page id for tracing
        required: true
        type: string
      cycle:
        description: Cycle number
        required: false
        type: string
        default: "1"

permissions:
  contents: read
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Echo metadata
        if: always()
        run: |
          echo "task_id=${{ inputs.task_id }}"
          echo "branch=${{ inputs.branch }}"
          echo "cycle=${{ inputs.cycle }}"
