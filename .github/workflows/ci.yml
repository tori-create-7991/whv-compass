name: CI

on:
  push:
    branches: [main]
  pull_request:

# Fork-safe: this workflow needs no secrets.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup は version 指定を省略すると package.json の
      # "packageManager" フィールド（pnpm@9.12.0）を自動採用する。両方指定
      # すると "Multiple versions of pnpm specified" で fail する
      # （main が 6/24 から継続して落ちていたバグ）。
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
